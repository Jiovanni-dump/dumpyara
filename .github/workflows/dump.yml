name: Dump

on:
  push:
    branches:
      - master

env:
  DUMP_URL: "https://bigota.d.miui.com/V14.0.7.0.TLUMIXM/miui_ROCKGlobal_V14.0.7.0.TLUMIXM_b16d8555c3_13.0.zip" # Direct url to a recovery zip

jobs:
  dump:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Git
        uses: actions/checkout@v3

      - name: Create .githubtoken file
        run: echo "${{ secrets.GIT_TOKEN }}" > .githubtoken

      - name: Create .tgtoken file
        run: echo "${{ secrets.TELEGRAM_TOKEN }}" > .tgtoken

      - name: Set up environment
        run: bash setup.sh

      # protobuf-compiler is required for this
      #- name: Install otadump
      #  uses: actions-rs/install@v0.1
      #  with:
      #    crate: otadump
      #    version: latest

      #- name: Download "$DUMP_URL"
      #  run: aria2c "$DUMP_URL"

      #- name: Run dumpyara
      #  run: |
      #    ZIP_FILE=$(ls *.zip)
      #    bash dumpyara.sh "$ZIP_FILE"

      - name: Run dumpyara
        run: |
          bash dumpyara.sh "$DUMP_URL"

